services:
  auth-db:
    image: postgres:16-alpine
    container_name: auth_log_exp_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auth_log_exp
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    volumes:
      - auth_log_exp_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build: .
    container_name: auth_log_exp_app
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
    depends_on:
      - auth-db
    volumes:
      - .:/app:delegated

volumes:
  auth_log_exp_pgdata:
